<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1.6;color:#333333;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f4f6f9;">
        <tr>
            <td align="center" style="padding:24px 16px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(27,54,93,0.08);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="background:#0d1031;padding:20px 24px 16px;border-radius:12px 12px 0 0;">
                            <!--[if mso]>
                            <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:600px;height:160px;">
                            <v:fill type="gradient" color="#0d1031" color2="#1a1f4e" angle="180" />
                            <v:textbox inset="0,0,0,0" style="mso-fit-shape-to-text:true;">
                            <![endif]-->
                            <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="padding-bottom:4px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td style="font-size:42px;font-weight:800;color:#ffffff;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;letter-spacing:-0.5px;line-height:1.1;">DSSA</td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding-bottom:4px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="80" style="width:80px;">
                                            <tr>
                                                <td style="border-top:3px solid #D4A020;font-size:0;line-height:0;">&nbsp;</td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:4px 0 0;font-size:13px;font-weight:400;color:rgba(255,255,255,0.85);font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;letter-spacing:1.5px;text-transform:uppercase;">Data Science Student Association</td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:4px 0 0;font-size:12px;color:rgba(255,255,255,0.6);font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">University of Delaware</td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:10px 0 0;">
                                        <table role="presentation" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td style="background:#D4A020;border-radius:4px;padding:6px 18px;">
                                                    <p style="margin:0;font-size:13px;font-weight:700;color:#0d1031;letter-spacing:0.5px;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">{{senderLabel}}</p>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:6px 0 0;font-size:12px;"><a href="https://bluehen-dssa.org" style="color:rgba(255,255,255,0.75);text-decoration:none;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">bluehen-dssa.org</a></td>
                                </tr>
                            </table>
                            <!--[if mso]>
                            </v:textbox>
                            </v:rect>
                            <![endif]-->
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:32px 32px 24px;">
                            {{bodyHtml}}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 32px;border-top:1px solid #e8ecf0;background-color:#f9fafb;">
                            <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="padding-bottom:12px;">
                                        <p style="margin:0;font-size:13px;color:#64748b;font-weight:500;">Data Science Student Association @ University of Delaware</p>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center">
                                        <p style="margin:0;font-size:12px;color:#94a3b8;">
                                            <a href="{{unsubscribeUrl}}" style="color:#D4A020;text-decoration:none;">Unsubscribe</a>
                                            <span style="color:#cbd5e1;margin:0 8px;">|</span>
                                            <a href="https://bluehen-dssa.org" style="color:#1B365D;text-decoration:none;">Visit bluehen-dssa.org</a>
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
